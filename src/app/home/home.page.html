<ion-content class="ion-padding">
  
  <ion-item lines="none">
    <ion-label style="font-weight: bold;">Figura Geométrica</ion-label>
    <ion-select 
      [(ngModel)]="tipoFigura" 
      interface="alert" 
      placeholder="Seleccione una opción" 
      cancelText="CANCELAR" 
      okText="DE ACUERDO">
      <ion-select-option value="circulo">Círculo</ion-select-option>
      <ion-select-option value="triangulo">Triángulo Escaleno</ion-select-option>
    </ion-select>
  </ion-item>

  <div style="border-bottom: 2px solid #4eb174; margin-bottom: 20px;"></div>

  <!--  DEBE COINCIDIR: -->
  <app-circulo *ngIf="tipoFigura === 'circulo'"></app-circulo>
  <app-triangulo *ngIf="tipoFigura === 'triangulo'"></app-triangulo>

</ion-content>
